{% extends "base.html" %}
{% load i18n %}

{% block title %}404{% endblock %}

{% block content %}
<div class="container">
    <div class="error-page">
        <span class="material-icons error-icon">search_off</span>
        <h1 class="error-code">404</h1>
        <p class="error-title">{% trans "Page not found." %}</p>
        <p class="error-subtitle">{% trans "The page you are looking for does not exist or has been moved." %}</p>
        <a href="/" class="btn btn-primary">
            <span class="material-icons btn-icon">home</span>
            {% trans "Go to Home page" %}
        </a>
    </div>
</div>
{% endblock %}
