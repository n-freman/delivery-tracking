{% load i18n %}
<header class="header">
    <div class="container">
        <a href="/" class="logo">
            <span class="material-icons logo-icon">local_shipping</span>
            DMCargo
        </a>
        <nav class="nav">
            {% if user.is_authenticated %}
                <span class="nav-user">
                    <span class="material-icons nav-icon">person</span>
                    {{ user.username }}
                </span>
                <a href="{% url 'auth:logout' %}" class="nav-link">
                    <span class="material-icons nav-icon">logout</span>
                    {% trans "Logout" %}
                </a>
            {% else %}
                <a href="{% url 'auth:login' %}" class="nav-link">
                    <span class="material-icons nav-icon">login</span>
                    {% trans "Login" %}
                </a>
            {% endif %}
            <div class="lang-switcher">
                <form action="{% url 'set_language' %}" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.path }}">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    <select name="language" onchange="this.form.submit()">
                        {% for code, name in LANGUAGES %}
                            <option value="{{ code }}" {% if code == LANGUAGE_CODE %}selected{% endif %}>
                                {{ name }}
                            </option>
                        {% endfor %}
                    </select>
                </form>
            </div>
        </nav>
    </div>
</header>
