upstream delivery_tracking {
    server unix:/home/dmcargo/delivery-tracking/run/gunicorn.sock fail_timeout=0;
}

# ── Redirect HTTP → HTTPS (domain only) ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name log.dmcargo.biz;
    return 301 https://$host$request_uri;
}

# ── IP access (HTTP only, no SSL) ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 62.113.115.31;

    root /home/dmcargo/delivery-tracking;

    access_log /home/dmcargo/delivery-tracking/logs/nginx-access.log;
    error_log /home/dmcargo/delivery-tracking/logs/nginx-error.log;

    client_max_body_size 50M;

    location /static/ {
        alias /home/dmcargo/delivery-tracking/src/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/dmcargo/delivery-tracking/src/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        alias /home/dmcargo/delivery-tracking/src/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
        expires max;
    }

    location / {
        try_files $uri @proxy_to_app;
    }

    location @proxy_to_app {
        proxy_pass http://delivery_tracking;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(py|pyc|po|mo|sqlite3)$ {
        deny all;
        return 404;
    }
}

# ── HTTPS (domain only) ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name log.dmcargo.biz;

    ssl_certificate /etc/letsencrypt/live/log.dmcargo.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/log.dmcargo.biz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /home/dmcargo/delivery-tracking;

    access_log /home/dmcargo/delivery-tracking/logs/nginx-ssl-access.log;
    error_log /home/dmcargo/delivery-tracking/logs/nginx-ssl-error.log;

    client_max_body_size 50M;

    location /static/ {
        alias /home/dmcargo/delivery-tracking/src/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/dmcargo/delivery-tracking/src/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        alias /home/dmcargo/delivery-tracking/src/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
        expires max;
    }

    location / {
        try_files $uri @proxy_to_app;
    }

    location @proxy_to_app {
        proxy_pass http://delivery_tracking;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(py|pyc|po|mo|sqlite3)$ {
        deny all;
        return 404;
    }
}
