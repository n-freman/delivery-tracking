# /home/dmcargo/delivery-tracking/configs/nginx/delivery_tracking.conf

upstream delivery_tracking {
    server unix:/home/dmcargo/delivery-tracking/run/gunicorn.sock fail_timeout=0;
    # server 127.0.0.1:8000; # Alternative if using TCP socket
}

server {
    listen 80;
    listen [::]:80;

    server_name 62.113.115.31 log.dmcargo.biz;

    root /home/dmcargo/delivery-tracking;

    # Access and error logs
    access_log /home/dmcargo/delivery-tracking/logs/nginx-access.log;
    error_log /home/dmcargo/delivery-tracking/logs/nginx-error.log;

    client_max_body_size 50M;

    location /static/ {
        alias /home/dmcargo/delivery-tracking/src/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/dmcargo/delivery-tracking/src/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        alias /home/dmcargo/delivery-tracking/src/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
        expires max;
    }

    location / {
        try_files $uri @proxy_to_app;
    }

    location @proxy_to_app {
        proxy_pass http://delivery_tracking;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(py|pyc|po|mo|sqlite3)$ {
        deny all;
        return 404;
    }
}

